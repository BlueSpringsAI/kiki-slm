inherits: base.yaml
task: response_generator
output_dir: runs/sft-response-v1

lora:
  r: 64
  lora_alpha: 64
  target_modules: all-linear

training:
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  num_train_epochs: 3
  learning_rate: 2.0e-4
  lr_scheduler_type: cosine
  warmup_ratio: 0.03
  packing: true
  max_seq_length: 2048

datasets:
  - id: kiki_annotated
    weight: 0.30
  - id: bitext/Bitext-customer-support-llm-chatbot-training-dataset
    weight: 0.25
  - id: bitext/Bitext-retail-ecommerce-llm-chatbot-training-dataset
    weight: 0.15
  - id: gretelai/gretel-safety-alignment-en-v1
    weight: 0.15
  - id: arcee-ai/agent-data
    weight: 0.15
