inherits: base.yaml
task: workflow_reasoner
output_dir: runs/sft-workflow-v1

lora:
  r: 32
  lora_alpha: 64
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

training:
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  num_train_epochs: 3
  learning_rate: 2.0e-4
  lr_scheduler_type: cosine
  warmup_ratio: 0.03
  packing: true
  max_seq_length: 2048

datasets:
  - id: kiki_annotated
    weight: 0.4
  - id: bitext/Bitext-customer-support-llm-chatbot-training-dataset
    weight: 0.3
  - id: arcee-ai/agent-data
    weight: 0.3
