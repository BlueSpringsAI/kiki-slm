model:
  # Using Unsloth's repo for the patched chat template that correctly handles
  # reasoning_content + tool_calls together (fixes assistant_only_loss masking).
  name: unsloth/Qwen3-4B-Thinking-2507
  max_seq_length: 4096
  load_in_4bit: true
  use_unsloth: true

defaults:
  bf16: true
  gradient_checkpointing: true
  gradient_checkpointing_kwargs:
    use_reentrant: false
  optim: adamw_8bit
  report_to: [wandb]
  save_strategy: steps
  save_steps: 500
  eval_strategy: steps
  eval_steps: 500
  logging_steps: 10
  seed: 42
